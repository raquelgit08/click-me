<!DOCTYPE html>
<html>
<head>
    <title>Test Envelope</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        
        .test-box {
            width: 400px;
            height: 250px;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
            border-radius: 10px;
            margin: 50px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .test-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        
        .test-content {
            text-align: center;
        }
        
        .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .title {
            margin-bottom: 8px;
        }
        
        .subtitle {
            opacity: 0.9;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div style="text-align: center; color: white; margin-bottom: 30px;">
        <h1>Special Message</h1>
        <p>Click on the envelope below to reveal your special message</p>
    </div>
    
    <div class="test-box" onclick="alert('Envelope clicked!')">
        <div class="test-content">
            <div class="icon">✉️</div>
            <div class="title">A Special Message Just For You</div>
            <div class="subtitle">Click to open</div>
            <div style="margin-top: 8px;">▼</div>
        </div>
    </div>
    
    <div style="text-align: center; color: white; margin-top: 30px;">
        <p>If you can see this pink box with envelope icon, then the basic structure works!</p>
    </div>
</body>
</html>
